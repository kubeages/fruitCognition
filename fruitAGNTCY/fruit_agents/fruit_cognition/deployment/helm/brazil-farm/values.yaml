# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

appName: brazil-farm
appVersion: v1
replicaCount: 1

image:
  repository: ghcr.io/kubeages/fruit-agntcy/brazil-farm
  tag: latest
  pullPolicy: Always
  pullSecret:

service:
  port: 9999

config:
  azureApiBase: ""
  azureApiVersion: ""
  llmModel: ""
  transportServerEndpoint: ""
  defaultMessageTransport: ""
  # Host:port for SLIM dataplane (no scheme). Set per environment (e.g. slim:46357 in compose DNS).
  slimServer: ""
  natsServer: ""
  # When externalSecrets is not used, set to inject SLIM_SHARED_SECRET via Helm Secret (see transport-secret.tpl.yaml).
  slimSharedSecret: ""
  otlpHttpEndpoint: ""
#  llmStreaming: False

# You can use your own config here for service account
serviceaccount:
  annotations:
    eks.amazonaws.com/role-arn: REPLACE_WITH_ROLE_ARN


probes:
  livenessProbeEnabled: false
  readinessProbeEnabled: false
  port: 9999
  endpoint: /v1/health

resources:
  enabled: false
  limits:
    cpu: 2000m
    memory: 2500Mi
  requests:
    cpu: 200m
    memory: 500Mi
