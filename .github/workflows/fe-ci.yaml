# Frontend CI: typecheck, ESLint, and Prettier for FruitCognition frontend when files there change.
# CD (deploy to dev/staging) would be a separate workflow. IDE: see TUTORIAL.md § IDE setup for CI (lint/format).
name: FE CI

on:
  pull_request:
    branches: [main]
    paths:
      - "fruitAGNTCY/fruit_agents/fruit_cognition/frontend/**"
  push:
    branches: [main]
    paths:
      - "fruitAGNTCY/fruit_agents/fruit_cognition/frontend/**"

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fruitAGNTCY/fruit_agents/fruit_cognition/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: fruitAGNTCY/fruit_agents/fruit_cognition/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript
        run: npm run typecheck

      - name: ESLint
        run: npm run lint:check

      - name: Prettier
        run: npm run format:check
